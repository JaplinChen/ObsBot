name: Build Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安裝 ObsBot 依賴
        run: npm ci

      - name: 安裝 Electron 依賴
        run: cd electron && npm ci

      - name: 匯入 macOS 簽署憑證
        env:
          MAC_CERT_BASE64: ${{ secrets.MAC_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          echo "$MAC_CERT_BASE64" | base64 --decode > /tmp/obsbot-mac.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import /tmp/obsbot-mac.p12 \
            -k build.keychain \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "" build.keychain

      - name: 打包 macOS arm64
        run: npm run app:pack:mac-arm64
        env:
          CSC_KEYCHAIN: build.keychain
          CSC_KEY_PASSWORD: ${{ secrets.CERT_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 打包 macOS x64
        run: npm run app:pack:mac-x64
        env:
          CSC_KEYCHAIN: build.keychain
          CSC_KEY_PASSWORD: ${{ secrets.CERT_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上傳 macOS 安裝檔
        uses: actions/upload-artifact@v4
        with:
          name: mac-installers
          path: release/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安裝 ObsBot 依賴
        run: npm ci

      - name: 安裝 Electron 依賴
        run: cd electron && npm ci

      - name: 匯入 Windows 簽署憑證
        env:
          WIN_CERT_BASE64: ${{ secrets.WIN_CERT_BASE64 }}
        run: |
          $bytes = [Convert]::FromBase64String($env:WIN_CERT_BASE64)
          [IO.File]::WriteAllBytes("$env:TEMP\obsbot-win.pfx", $bytes)

      - name: 打包 Windows（x64）
        run: npm run app:pack:win
        env:
          WIN_CSC_LINK: ${{ runner.temp }}\obsbot-win.pfx
          WIN_CSC_KEY_PASSWORD: ${{ secrets.CERT_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上傳 Windows 安裝檔
        uses: actions/upload-artifact@v4
        with:
          name: win-installer
          path: release/*.exe

  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 下載所有安裝檔
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: 建立 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
