<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ObsBot Research</title>
<script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg0:#f0f2f5;--bg1:#ffffff;--bg2:#f8f9fb;--bg3:#eef0f4;--bdr:#e0e3ea;--bdr2:#cdd2dc;--txt1:#1a1a2e;--txt2:#4a4a6a;--txt3:#8890a4;--gold:#667eea;--gold2:rgba(102,126,234,.12);--gold3:rgba(102,126,234,.30);--pu:#667eea;--pu2:rgba(102,126,234,.10);--pu3:rgba(102,126,234,.25);--gn:#27ae60;--gn2:rgba(39,174,96,.10);--gn3:rgba(39,174,96,.25)}
html,body{height:100%;overflow:hidden;background:var(--bg0);color:var(--txt1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang TC','Microsoft JhengHei',sans-serif;font-size:14px;line-height:1.5}
.app{display:flex;height:100vh;overflow:hidden}
/* 左欄 sidebar */
.left{background:var(--bg1);border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden;width:280px;flex-shrink:0}
.sb-top{padding:12px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:9px;flex-shrink:0}
.sb-icon{width:28px;height:28px;background:var(--pu);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;flex-shrink:0}
.sb-name{font-size:15px;color:var(--txt1);font-weight:600;flex:1}
.sb-sub{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;margin-top:1px}
.back-btn{background:transparent;border:1px solid var(--bdr);border-radius:6px;padding:4px 10px;color:var(--txt3);font-size:12px;cursor:pointer;text-decoration:none;font-family:inherit;transition:all .2s;flex-shrink:0}
.back-btn:hover{border-color:var(--pu3);color:var(--pu)}
.lang-sw{position:relative;flex-shrink:0}
.lang-sw-btn{background:transparent;border:1px solid var(--bdr);border-radius:6px;padding:3px 8px;cursor:pointer;font-size:16px;line-height:1;transition:border-color .2s}
.lang-sw-btn:hover{border-color:var(--pu3)}
.lang-sw-menu{display:none;position:absolute;left:0;top:100%;margin-top:4px;background:var(--bg1);border:1px solid var(--bdr);border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:100;min-width:140px;overflow:hidden}
.lang-sw-menu.open{display:block}
.lang-sw-opt{display:flex;align-items:center;gap:7px;padding:8px 12px;cursor:pointer;font-size:12px;color:var(--txt2);border:none;background:none;width:100%;font-family:inherit;text-align:left;transition:background .15s}
.lang-sw-opt:hover{background:var(--pu2)}
.lang-sw-opt.active{background:var(--pu2);color:var(--pu);font-weight:600}
.search-bar{padding:8px 14px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.search-bar input{width:100%;background:var(--bg0);border:1px solid var(--bdr);border-radius:6px;padding:7px 10px;color:var(--txt1);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s}
.search-bar input:focus{border-color:var(--pu)}
.search-bar input::placeholder{color:var(--txt3)}
/* 標籤列 */
.tag-bar{padding:7px 14px;border-bottom:1px solid var(--bdr);flex-shrink:0;display:flex;flex-wrap:wrap;gap:5px;max-height:68px;overflow-y:auto}
.tag-chip{background:var(--bg0);border:1px solid var(--bdr);border-radius:20px;padding:3px 9px;font-size:11px;color:var(--txt3);cursor:pointer;transition:all .2s;font-weight:500}
.tag-chip.on{background:var(--gold2);border-color:var(--gold3);color:var(--gold)}
.tag-chip:hover:not(.on){color:var(--txt2)}
.note-list{flex:1;overflow-y:auto;padding:6px}
/* 資料夾 */
.folder-hdr{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:6px;cursor:pointer;color:var(--txt3);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;user-select:none;transition:color .2s}
.folder-hdr:hover{color:var(--txt2)}
.folder-arrow{font-size:9px;transition:transform .2s;display:inline-block;width:14px}
.folder-arrow.open{transform:rotate(90deg)}
.folder-ct{font-size:11px;color:var(--txt3);margin-left:auto;font-weight:400;background:var(--bg2);padding:2px 7px;border-radius:10px}
.folder-chk{width:16px;height:16px;border:1.5px solid var(--txt3);border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-size:10px;font-weight:700;cursor:pointer;margin-left:4px;color:transparent;background:var(--bg0)}
.folder-chk:hover{border-color:var(--pu);color:var(--pu);background:var(--pu2)}
.folder-chk.part{background:var(--pu2);border-color:var(--pu3);color:var(--pu)}
.folder-chk.all{background:var(--pu);border-color:var(--pu);color:#fff}
.folder-children{padding-left:11px}
/* 筆記項目 */
.note-item{display:flex;align-items:center;gap:7px;padding:5px 9px;border-radius:6px;cursor:pointer;transition:all .2s;border:1px solid transparent;margin-bottom:2px;font-size:13px}
.note-item:hover{background:var(--bg2)}
.note-item.selected{background:var(--pu2);border-color:var(--pu3)}
.note-chk{width:15px;height:15px;border:1.5px solid var(--bdr2);border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-size:9px;color:transparent}
.note-chk.on{background:var(--pu);border-color:var(--pu);color:#fff}
.note-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--txt2)}
.note-item.selected .note-name{color:var(--pu)}
.note-tags-dot{width:5px;height:5px;border-radius:50%;background:var(--pu);flex-shrink:0;opacity:.6}
/* 底部狀態列 */
.bot-bar{padding:9px 14px;border-top:1px solid var(--bdr);flex-shrink:0;display:flex;gap:7px;align-items:center}
.bot-bar .sel-ct{font-size:12px;color:var(--txt2);flex:1}
.bot-bar .sel-ct b{color:var(--pu);font-weight:700}
.bot-bar .clr{background:none;border:none;color:var(--txt3);font-size:12px;cursor:pointer;font-family:inherit}
.bot-bar .clr:hover{color:var(--txt2)}
.batch-btns{display:none;gap:5px}
.batch-btns.vis{display:flex}
.batch-btn{background:none;border:1px solid var(--bdr);border-radius:6px;padding:4px 9px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;color:var(--txt2);white-space:nowrap}
.batch-btn:hover{border-color:var(--bdr2);color:var(--txt1)}
.batch-btn.danger{border-color:rgba(231,76,60,.4);color:#e74c3c}
.batch-btn.danger:hover{background:#e74c3c;color:#fff;border-color:#e74c3c}
/* 中欄 */
.center{display:flex;flex-direction:column;overflow:hidden;background:var(--bg0);flex:1;min-width:0;position:relative}
.topic-bar{padding:11px 20px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:9px;background:var(--bg1);flex-shrink:0}
.topic-bar input{flex:1;background:var(--bg0);border:1px solid var(--bdr2);border-radius:8px;padding:9px 13px;color:var(--txt1);font-size:15px;font-style:italic;font-family:inherit;outline:none;transition:border-color .2s}
.topic-bar input:focus{border-color:var(--gold)}
.topic-bar input::placeholder{color:var(--txt3);font-style:italic}
.topic-bar button{background:var(--pu);border:none;border-radius:8px;padding:9px 16px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;transition:opacity .2s}
.topic-bar button:hover{opacity:.88}
.messages{flex:1;overflow-y:auto;padding:22px 26px;display:flex;flex-direction:column;gap:24px}
.msg{display:flex;gap:10px;animation:fu .22s ease}
@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.msg-ava{width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:2px}
.msg-ava.ai{background:var(--pu2);color:var(--pu);border:1px solid var(--pu3)}
.msg-ava.user{background:var(--bg2);color:var(--txt2);border:1px solid var(--bdr)}
.msg-body{flex:1;min-width:0}
.msg-role{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;color:var(--txt3)}
.msg-text{color:var(--txt2);font-size:14px;line-height:1.85}
/* Markdown 渲染樣式 */
.msg-text h1,.msg-text h2,.msg-text h3,.msg-text h4{color:var(--txt1);margin:16px 0 8px;line-height:1.4}
.msg-text h1{font-size:1.4em;border-bottom:1px solid var(--bdr);padding-bottom:6px}
.msg-text h2{font-size:1.2em;border-bottom:1px solid var(--bdr);padding-bottom:4px}
.msg-text h3{font-size:1.05em}
.msg-text h4{font-size:1em}
.msg-text p{margin:8px 0}
.msg-text ul,.msg-text ol{margin:8px 0;padding-left:24px}
.msg-text li{margin:3px 0}
.msg-text li>p{margin:2px 0}
.msg-text strong{color:var(--txt1);font-weight:600}
.msg-text em{font-style:italic}
.msg-text blockquote{border-left:3px solid var(--pu);margin:10px 0;padding:6px 14px;background:var(--pu2);border-radius:0 6px 6px 0;color:var(--txt2)}
.msg-text code{background:var(--bg3);padding:1px 5px;border-radius:4px;font-size:0.9em;font-family:'SF Mono',Monaco,Menlo,monospace}
.msg-text pre{background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;padding:12px;margin:10px 0;overflow-x:auto}
.msg-text pre code{background:none;padding:0;font-size:0.85em}
.msg-text a{color:var(--pu);text-decoration:none}
.msg-text a:hover{text-decoration:underline}
.msg-text table{border-collapse:collapse;margin:10px 0;width:100%;font-size:13px}
.msg-text th,.msg-text td{border:1px solid var(--bdr);padding:6px 10px;text-align:left}
.msg-text th{background:var(--bg3);font-weight:600;color:var(--txt1)}
.msg-text tr:nth-child(even){background:var(--bg2)}
.msg-text hr{border:none;border-top:1px solid var(--bdr);margin:16px 0}
.msg-text .wikilink{color:var(--pu);background:var(--pu2);padding:1px 6px;border-radius:4px;font-size:0.92em;cursor:pointer;text-decoration:none;display:inline}
.msg-text .wikilink:hover{background:var(--pu3);text-decoration:underline}
.msg-actions{display:flex;gap:5px;margin-top:10px;flex-wrap:wrap;align-items:center}
.msg-action-btn{background:transparent;color:var(--txt3);border:1px solid var(--bdr);padding:3px 9px;border-radius:5px;cursor:pointer;font-size:11.5px;display:flex;align-items:center;gap:4px;transition:all .15s;white-space:nowrap;font-family:inherit}
.msg-action-btn:hover{background:var(--bg3);color:var(--txt2);border-color:var(--bdr2)}
.msg-action-btn.saved{background:#1b4332;color:#fff;border-color:#1b4332}
.msg-action-sep{color:var(--bdr2);margin:0 2px;font-size:12px;user-select:none}
.msg-tool-wrap{position:relative;display:inline-block}
.msg-tool-menu{display:none;position:absolute;bottom:calc(100% + 4px);left:0;background:var(--bg1);border:1px solid var(--bdr2);border-radius:8px;padding:4px;min-width:130px;z-index:100;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.msg-tool-menu.open{display:block}
.msg-tool-item{display:flex;align-items:center;gap:7px;padding:6px 10px;border-radius:5px;cursor:pointer;font-size:12px;color:var(--txt2);white-space:nowrap;transition:background .12s}
.msg-tool-item:hover{background:var(--bg3);color:var(--txt1)}
/* Toast 提示 */
#vaultToast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:#1b4332;color:#fff;padding:9px 18px;border-radius:8px;font-size:12.5px;opacity:0;pointer-events:none;transition:all .25s;z-index:2000;max-width:420px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#vaultToast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* 筆記預覽 modal */
.note-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;justify-content:center;align-items:center}
.note-modal-overlay.open{display:flex}
.note-modal{background:var(--bg1);border-radius:12px;width:min(800px,90vw);max-height:85vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.note-modal-hdr{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.note-modal-hdr h2{flex:1;font-size:16px;color:var(--txt1);margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.note-modal-hdr button{background:none;border:none;font-size:20px;cursor:pointer;color:var(--txt3);padding:4px 8px;border-radius:6px}
.note-modal-hdr button:hover{background:var(--bg0);color:var(--txt1)}
.note-modal-body{flex:1;overflow-y:auto;padding:20px 24px;color:var(--txt2);font-size:14px;line-height:1.85}
.note-modal-body h1,.note-modal-body h2,.note-modal-body h3,.note-modal-body h4{color:var(--txt1);margin:16px 0 8px;line-height:1.4}
.note-modal-body h1{font-size:1.4em;border-bottom:1px solid var(--bdr);padding-bottom:6px}
.note-modal-body h2{font-size:1.2em;border-bottom:1px solid var(--bdr);padding-bottom:4px}
.note-modal-body p{margin:8px 0}
.note-modal-body ul,.note-modal-body ol{margin:8px 0;padding-left:24px}
.note-modal-body li{margin:3px 0}
.note-modal-body strong{color:var(--txt1);font-weight:600}
.note-modal-body blockquote{border-left:3px solid var(--pu);margin:10px 0;padding:6px 14px;background:var(--pu2);border-radius:0 6px 6px 0}
.note-modal-body code{background:var(--bg3);padding:1px 5px;border-radius:4px;font-size:0.9em;font-family:'SF Mono',Monaco,Menlo,monospace}
.note-modal-body pre{background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;padding:12px;margin:10px 0;overflow-x:auto}
.note-modal-body pre code{background:none;padding:0}
.note-modal-body table{border-collapse:collapse;margin:10px 0;width:100%;font-size:13px}
.note-modal-body th,.note-modal-body td{border:1px solid var(--bdr);padding:6px 10px;text-align:left}
.note-modal-body th{background:var(--bg3);font-weight:600;color:var(--txt1)}
.note-modal-body a{color:var(--pu);text-decoration:none}
.note-modal-body a:hover{text-decoration:underline}
.note-modal-body .wikilink{color:var(--pu);background:var(--pu2);padding:1px 6px;border-radius:4px;font-size:0.92em;cursor:pointer}
.note-modal-body .wikilink:hover{background:var(--pu3);text-decoration:underline}
/* 右欄 markdown */
.overview-item h1,.overview-item h2,.overview-item h3{font-size:12px;color:var(--txt1);margin:6px 0 3px}
.overview-item p{margin:4px 0}
.overview-item ul,.overview-item ol{padding-left:18px;margin:4px 0}
.overview-item strong{color:var(--txt1)}
.chat-input{padding:11px 20px 16px;border-top:1px solid var(--bdr);flex-shrink:0}
.chat-wrap{display:flex;gap:8px;background:var(--bg1);border:1px solid var(--bdr2);border-radius:12px;padding:8px 8px 8px 14px;align-items:flex-end;transition:border-color .2s}
.chat-wrap:focus-within{border-color:var(--gold)}
.chat-wrap textarea{flex:1;background:transparent;border:none;outline:none;color:var(--txt1);font-size:14px;font-family:inherit;resize:none;line-height:1.6;min-height:22px;max-height:100px}
.chat-wrap textarea::placeholder{color:var(--txt3)}
.chat-wrap button{background:var(--pu);border:none;border-radius:8px;width:33px;height:33px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .2s;color:#fff;font-size:14px;font-weight:700}
.chat-wrap button:hover{opacity:.85}
/* 右欄 */
.right{background:var(--bg1);border-left:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden;width:320px;flex-shrink:0}
.right-tabs{display:flex;border-bottom:1px solid var(--bdr);flex-shrink:0}
.right-tabs button{flex:1;padding:11px 4px;font-size:11.5px;font-weight:700;text-align:center;cursor:pointer;color:var(--txt3);border:none;background:transparent;border-bottom:2px solid transparent;transition:all .2s;text-transform:uppercase;letter-spacing:.3px;font-family:inherit}
.right-tabs button.active{color:var(--gold);border-bottom-color:var(--gold)}
.right-tabs button:hover:not(.active){color:var(--txt2)}
.right-content{flex:1;overflow-y:auto;padding:14px}
.overview-section{margin-bottom:20px}
.overview-section h3{font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;font-weight:700;margin-bottom:9px}
.overview-item{background:var(--bg0);border:1px solid var(--bdr);border-radius:8px;padding:9px 11px;margin-bottom:6px;font-size:12.5px;cursor:pointer;color:var(--txt2);transition:all .2s;line-height:1.55}
.overview-item:hover{border-color:var(--bdr2);color:var(--txt1)}
.tool-btn{width:100%;background:transparent;border:1px solid var(--bdr2);border-radius:8px;padding:10px 12px;color:var(--txt2);font-size:13px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:9px;transition:all .2s;margin-bottom:6px;text-align:left}
.tool-btn:hover{border-color:var(--gold3);color:var(--gold)}
.tool-btn .icon{font-size:16px;flex-shrink:0}
.loading{color:var(--txt3);font-size:13px;padding:10px;text-align:center}
.empty{color:var(--txt3);font-size:13px;padding:20px;text-align:center}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--txt3)}
/* ── Mobile layout ── */
.mob-tabs{display:none}
@media(max-width:900px){
  .app{flex-direction:column;height:calc(100vh - 52px)}
  .left,.center,.right{display:none;width:100%;flex-shrink:0;flex:unset}
  .left.mob-active,.right.mob-active{display:flex;height:100%}
  .center.mob-active{display:flex;flex-direction:column;height:100%}
  .mob-tabs{
    display:flex;position:fixed;bottom:0;left:0;right:0;height:52px;
    background:var(--bg1);border-top:1px solid var(--bdr);z-index:200;
    safe-area-inset-bottom:env(safe-area-inset-bottom)
  }
  .mob-tab{
    flex:1;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:2px;border:none;background:none;
    cursor:pointer;color:var(--txt3);transition:color .15s;font-family:inherit;
    padding:0;position:relative
  }
  .mob-tab.active{color:var(--pu)}
  .mob-tab-icon{font-size:20px;line-height:1}
  .mob-tab-label{font-size:10px;font-weight:500}
  .mob-sel-badge{
    position:absolute;top:4px;right:calc(50% - 16px);
    background:var(--pu);color:#fff;border-radius:10px;
    font-size:9px;font-weight:700;padding:0 5px;line-height:14px;
    display:none
  }
}
/* Theme toggle */
.theme-sw-btn{background:transparent;border:1px solid var(--bdr);border-radius:6px;padding:3px 8px;cursor:pointer;font-size:15px;line-height:1;transition:all .2s;flex-shrink:0}
.theme-sw-btn:hover{border-color:var(--pu3);transform:scale(1.08)}
/* Dark mode tokens */
[data-theme="dark"]{--bg0:#0f0f1a;--bg1:#1c1c2e;--bg2:#252538;--bg3:#2e2e48;--bdr:#383858;--bdr2:#4a4a6a;--txt1:#e2e4f0;--txt2:#9094b0;--txt3:#606880}
/* ── P1: Step cards ── */
.steps-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;padding:30px}
.step-card{display:flex;align-items:flex-start;gap:12px;background:var(--bg1);border:1px solid var(--bdr);border-radius:10px;padding:12px 16px;width:100%;max-width:380px;transition:all .25s}
.step-card.active{border-color:var(--pu3);background:var(--pu2)}
.step-card.done{border-color:var(--gn3);background:var(--gn2);opacity:.8}
.step-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;background:var(--bg3);color:var(--txt3);border:1.5px solid var(--bdr2);margin-top:1px}
.step-card.active .step-num{background:var(--pu);color:#fff;border-color:var(--pu)}
.step-card.done .step-num{background:var(--gn);color:#fff;border-color:var(--gn);font-size:13px}
.step-label{font-size:13px;font-weight:600;color:var(--txt2)}
.step-card.active .step-label{color:var(--pu)}
.step-card.done .step-label{color:var(--gn)}
.step-detail{font-size:12px;color:var(--txt3);margin-top:2px}
/* ── P2: Disabled tool buttons ── */
.tool-btn.disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.tool-section-note{font-size:11px;color:var(--txt3);padding:3px 2px 8px;font-style:italic}
/* ── P3: Selection badge in topic bar ── */
.sel-badge{background:var(--pu2);color:var(--pu);border:1px solid var(--pu3);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0}
/* ── P5: Restore session banner ── */
.restore-banner{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:500;background:var(--bg1);border:1px solid var(--pu3);border-radius:10px;padding:9px 14px;display:flex;gap:9px;align-items:center;box-shadow:0 4px 16px rgba(0,0,0,.18);font-size:13px;color:var(--txt2);animation:fu .25s ease}
.restore-banner .rb-topic{color:var(--txt1);font-weight:600;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.restore-banner .rb-btn{background:var(--pu);border:none;border-radius:6px;color:#fff;padding:4px 12px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600}
.restore-banner .rb-x{background:none;border:none;color:var(--txt3);font-size:16px;cursor:pointer;padding:0 2px;line-height:1}
/* ── Sessions history panel ── */
.sessions-panel{display:none;position:absolute;left:0;right:0;top:0;bottom:0;z-index:200;background:var(--bg1);flex-direction:column;overflow:hidden;animation:fu .18s ease}
.sessions-panel.open{display:flex}
.sessions-hdr{padding:12px 20px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:9px;flex-shrink:0}
.sessions-hdr h3{flex:1;font-size:14px;color:var(--txt1);font-weight:600;margin:0}
.sessions-hdr .sh-close{background:none;border:1px solid var(--bdr);border-radius:6px;padding:4px 11px;color:var(--txt3);font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s}
.sessions-hdr .sh-close:hover{border-color:var(--bdr2);color:var(--txt2)}
.sessions-hdr .sh-clear{background:none;border:1px solid var(--bdr);border-radius:6px;padding:4px 11px;color:var(--txt3);font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s}
.sessions-hdr .sh-clear:hover{border-color:#e74c3c;color:#e74c3c}
.sessions-list{flex:1;overflow-y:auto;padding:12px 16px}
.session-item{background:var(--bg2);border:1px solid var(--bdr);border-radius:9px;padding:11px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;transition:border-color .2s;cursor:default}
.session-item:hover{border-color:var(--pu3);background:var(--pu2)}
.session-info{flex:1;min-width:0}
.session-topic{font-size:13px;color:var(--txt1);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.session-meta{font-size:11px;color:var(--txt3);margin-top:3px}
.session-load{background:var(--pu);border:none;border-radius:6px;color:#fff;padding:5px 13px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600;white-space:nowrap;transition:opacity .15s}
.session-load:hover{opacity:.85}
.session-del{background:none;border:1px solid var(--bdr);border-radius:6px;color:var(--txt3);padding:5px 9px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s;flex-shrink:0}
.session-del:hover{border-color:#e74c3c;color:#e74c3c}
.sessions-empty{text-align:center;padding:50px 20px;color:var(--txt3);font-size:13px;line-height:2}
.history-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--pu);margin-left:3px;vertical-align:middle;flex-shrink:0}
/* Admin modal overlay */
.admin-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;align-items:center;justify-content:center}
.admin-overlay.open{display:flex}
.admin-frame-wrap{position:relative;width:min(700px,96vw);height:min(720px,92vh)}
.admin-frame{width:100%;height:100%;border:none;border-radius:16px;box-shadow:0 24px 80px rgba(0,0,0,.45)}
.admin-close{position:absolute;top:-14px;right:-14px;width:32px;height:32px;border-radius:50%;background:#fff;border:2px solid #e0e0e0;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.2);transition:all .2s}
.admin-close:hover{background:#f44;border-color:#f44;color:#fff}
/* ── 筆記管理 ── */
.note-act-btn{background:none;border:none;padding:2px 7px;cursor:pointer;color:var(--txt3);font-size:16px;border-radius:4px;line-height:1;flex-shrink:0;opacity:0;transition:opacity .15s,color .15s;font-family:inherit}
.note-item:hover .note-act-btn,.note-item.selected .note-act-btn{opacity:1}
.note-act-btn:hover{color:var(--pu)!important;background:var(--pu2)}
.note-ctx-menu{display:none;position:fixed;background:var(--bg1);border:1px solid var(--bdr2);border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.18);z-index:600;min-width:140px;overflow:hidden;animation:fu .12s ease}
.note-ctx-menu.open{display:block}
.note-ctx-btn{display:flex;align-items:center;gap:8px;width:100%;padding:10px 14px;border:none;background:none;font-family:inherit;font-size:13px;color:var(--txt2);cursor:pointer;transition:background .12s;text-align:left}
.note-ctx-btn:hover{background:var(--bg2)}
.note-ctx-btn.danger{color:#e74c3c}
.note-ctx-btn.danger:hover{background:#fff0f0}
[data-theme="dark"] .note-ctx-btn.danger:hover{background:#2a1010}
.mgmt-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1100;justify-content:center;align-items:center}
.mgmt-ov.open{display:flex}
.mgmt-dlg{background:var(--bg1);border-radius:12px;width:min(460px,94vw);max-height:80vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.22)}
.mgmt-dlg-hdr{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.mgmt-dlg-hdr h3{flex:1;font-size:15px;color:var(--txt1);margin:0;font-weight:600}
.mgmt-dlg-hdr button{background:none;border:none;font-size:20px;cursor:pointer;color:var(--txt3);padding:4px 8px;border-radius:6px;font-family:inherit}
.mgmt-dlg-hdr button:hover{background:var(--bg0);color:var(--txt1)}
.mgmt-dlg-body{padding:16px 18px;overflow-y:auto}
.folder-opt{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--txt2);border:1px solid transparent;transition:all .15s;margin-bottom:4px;user-select:none}
.folder-opt:hover{background:var(--pu2);border-color:var(--pu3);color:var(--pu)}
.rename-inp{width:100%;background:var(--bg0);border:1px solid var(--bdr2);border-radius:8px;padding:10px 12px;color:var(--txt1);font-size:14px;font-family:inherit;outline:none;margin-bottom:14px;transition:border-color .2s}
.rename-inp:focus{border-color:var(--pu)}
.mgmt-btns{display:flex;gap:8px;justify-content:flex-end}
.mgmt-btn{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;border:1px solid var(--bdr)}
.mgmt-btn.primary{background:var(--pu);border-color:var(--pu);color:#fff}
.mgmt-btn.primary:hover{opacity:.88}
.mgmt-btn.cancel{background:none;color:var(--txt2)}
.mgmt-btn.cancel:hover{border-color:var(--bdr2);color:var(--txt1)}
.mgmt-btn.danger{background:none;border-color:#e74c3c;color:#e74c3c}
.mgmt-btn.danger:hover{background:#e74c3c;color:#fff}
</style>
</head>
<body>
<div class="app">
  <div class="left">
    <div class="sb-top">
      <div class="sb-icon">⚡</div>
      <div style="flex:1;min-width:0"><div class="sb-name" data-i18n="research.title">Vault Research</div><div class="sb-sub" data-i18n="research.subtitle">本機 AI × Obsidian</div></div>
      <button class="theme-sw-btn" onclick="toggleDarkMode()" id="themeBtn" title="切換深色／淺色">🌙</button>
      <div class="lang-sw">
        <button class="lang-sw-btn" onclick="toggleRLangMenu()" id="rLangBtn" title="Language">🇹🇼</button>
        <div class="lang-sw-menu" id="rLangMenu">
          <button class="lang-sw-opt active" data-lang="zh-TW" onclick="changeRLang('zh-TW')">🇹🇼 繁體中文</button>
          <button class="lang-sw-opt" data-lang="en" onclick="changeRLang('en')">🇺🇸 English</button>
          <button class="lang-sw-opt" data-lang="vi" onclick="changeRLang('vi')">🇻🇳 Tiếng Việt</button>
        </div>
      </div>
      <button class="back-btn" onclick="openAdminPanel()" data-i18n="research.back">管理</button>
    </div>
    <div class="search-bar"><input id="search" data-i18n-placeholder="research.search" placeholder="搜尋筆記…" /></div>
    <div id="tagBar"></div>
    <div class="note-list" id="noteList"><div class="empty" data-i18n="research.scanning">正在掃描 Vault…</div></div>
    <div class="bot-bar">
      <span class="sel-ct"><b id="selCount">0</b> <span data-i18n="research.selected"> 篇已選</span></span>
      <div class="batch-btns" id="batchBtns">
        <button class="batch-btn" onclick="openBatchMove()">📂 移動</button>
        <button class="batch-btn danger" onclick="openBatchDelete()">🗑 刪除</button>
      </div>
      <button class="clr" onclick="clearSelection()" data-i18n="research.clear">清除</button>
    </div>
  </div>
  <div class="center">
    <div class="topic-bar">
      <input id="topic" data-i18n-placeholder="research.topicPlaceholder" placeholder="輸入研究主題…" oninput="renderEmpty()" onkeydown="if(event.key==='Enter')analyze()" />
      <span id="selBadge" class="sel-badge" style="display:none"></span>
      <span id="status" style="font-size:11px;color:var(--txt3);white-space:nowrap"></span>
      <button id="historyBtn" onclick="toggleSessionsPanel()" title="歷史研究" style="background:transparent;border:1px solid var(--bdr);border-radius:8px;padding:9px 13px;color:var(--txt3);font-size:13px;cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:5px">📂 <span id="historyBadge" style="display:none;background:var(--pu);color:#fff;border-radius:10px;font-size:10px;font-weight:700;padding:1px 6px;line-height:1.4">0</span></button>
      <button id="analyzeBtn" onclick="analyze()" data-i18n="research.analyze">分析</button>
    </div>
    <div class="messages" id="messages"></div>
    <div class="sessions-panel" id="sessionsPanel">
      <div class="sessions-hdr">
        <h3>📂 歷史研究</h3>
        <button class="sh-clear" onclick="clearAllSessions()" title="清除所有記錄">🗑 全部清除</button>
        <button class="sh-close" onclick="closeSessionsPanel()">✕ 關閉</button>
      </div>
      <div class="sessions-list" id="sessionsList"></div>
    </div>
    <div class="chat-input">
      <div class="chat-wrap">
        <textarea id="chatInput" rows="1" data-i18n-placeholder="research.chatPlaceholder" placeholder="詢問問題…（Enter 送出）" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
        <button onclick="sendMsg()">▶</button>
      </div>
      <div style="text-align:right;margin-top:6px">
        <button id="saveAllBtn" onclick="saveAllToVault(this)" style="background:transparent;border:1px solid var(--bdr);color:var(--txt3);padding:3px 10px;border-radius:5px;cursor:pointer;font-size:11.5px;font-family:inherit;transition:all .15s" onmouseover="this.style.color='var(--txt2)';this.style.borderColor='var(--bdr2)'" onmouseout="this.style.color='var(--txt3)';this.style.borderColor='var(--bdr)'">💾 全部存入 Vault</button>
      </div>
    </div>
  </div>
  <div class="right">
    <div class="right-tabs">
      <button class="active" onclick="switchTab(this,'overview')" data-i18n="research.tabOverview">概覽</button>
      <button onclick="switchTab(this,'tools')" data-i18n="research.tabTools">工具</button>
      <button onclick="switchTab(this,'slides')" data-i18n="research.tabSlides">投影片</button>
    </div>
    <div class="right-content" id="rightContent">
      <div class="empty" data-i18n="research.emptyOverview">分析後顯示概覽</div>
    </div>
  </div>
</div>
<!-- 手機底部 Tab Bar -->
<div class="mob-tabs">
  <button class="mob-tab" id="mobTabNotes" onclick="switchMobTab('notes')">
    <span id="mobSelBadge" class="mob-sel-badge">0</span>
    <span class="mob-tab-icon">📁</span>
    <span class="mob-tab-label">筆記</span>
  </button>
  <button class="mob-tab active" id="mobTabChat" onclick="switchMobTab('chat')">
    <span class="mob-tab-icon">💬</span>
    <span class="mob-tab-label">研究</span>
  </button>
  <button class="mob-tab" id="mobTabTools" onclick="switchMobTab('tools')">
    <span class="mob-tab-icon">🔧</span>
    <span class="mob-tab-label">工具</span>
  </button>
</div>
<div class="note-modal-overlay" id="noteModal" onclick="if(event.target===this)closeNoteModal()">
  <div class="note-modal">
    <div class="note-modal-hdr"><h2 id="noteModalTitle"></h2><button onclick="closeNoteModal()">✕</button></div>
    <div class="note-modal-body" id="noteModalBody"></div>
  </div>
</div>
<!-- 筆記操作浮動選單 -->
<div class="note-ctx-menu" id="noteCtxMenu">
  <button class="note-ctx-btn" onclick="ctxAction('view')">📖 查看內容</button>
  <button class="note-ctx-btn" onclick="ctxAction('move')">📂 移動到…</button>
  <button class="note-ctx-btn" onclick="ctxAction('rename')">✏️ 改名</button>
  <button class="note-ctx-btn danger" onclick="ctxAction('delete')">🗑 刪除</button>
</div>
<!-- 移動筆記對話框 -->
<div class="mgmt-ov" id="moveDialog" onclick="if(event.target===this)closeMoveDialog()">
  <div class="mgmt-dlg">
    <div class="mgmt-dlg-hdr"><h3>📂 移動到…</h3><button onclick="closeMoveDialog()">✕</button></div>
    <div class="mgmt-dlg-body" id="folderList" style="max-height:55vh;overflow-y:auto"></div>
  </div>
</div>
<!-- 改名對話框 -->
<div class="mgmt-ov" id="renameDialog" onclick="if(event.target===this)closeRenameDialog()">

    <div class="mgmt-dlg-hdr"><h3>✏️ 改名</h3><button onclick="closeRenameDialog()">✕</button></div>
    <div class="mgmt-dlg-body">
      <input class="rename-inp" id="renameInput" placeholder="輸入新名稱（不含 .md）" onkeydown="if(event.key==='Enter')submitRename()">
      <div class="mgmt-btns">
        <button class="mgmt-btn cancel" onclick="closeRenameDialog()">取消</button>

<div class="mgmt-ov" id="deleteDialog" onclick="if(event.target===this)closeDeleteDialog()">

    <div class="mgmt-dlg-hdr"><h3>🗑 確認刪除</h3><button onclick="closeDeleteDialog()">✕</button></div>
    <div class="mgmt-dlg-body">
      <p style="color:var(--txt2);margin-bottom:16px;font-size:14px;line-height:1.6">確定要刪除 <strong id="deleteNoteName" style="color:var(--txt1)"></strong> 嗎？此操作無法復原。</p>
      <div class="mgmt-btns">
        <button class="mgmt-btn cancel" onclick="closeDeleteDialog()">取消</button>
        <button class="mgmt-btn danger" onclick="submitDelete()">確認刪除</button>
      </div>
    </div>
  </div>
</div>
<script>
/* ── i18n engine ── */
/* __LOCALES_INJECT__ */
/* ── Dark mode (sync with admin) ── */
var _darkMode = localStorage.getItem('obsbot-theme') === 'dark';
function applyDarkMode() {
  document.documentElement.setAttribute('data-theme', _darkMode ? 'dark' : 'light');
  var btn = document.getElementById('themeBtn');
  if (btn) btn.textContent = _darkMode ? '☀️' : '🌙';
}
function toggleDarkMode() {
  _darkMode = !_darkMode;
  localStorage.setItem('obsbot-theme', _darkMode ? 'dark' : 'light');
  applyDarkMode();
}
var _lang = localStorage.getItem('obsbot-lang') || 'zh-TW';
var _langFlags = {'zh-TW':'🇹🇼','en':'🇺🇸','vi':'🇻🇳'};
function t(key, params) {
  var s = (_locales[_lang] && _locales[_lang][key]) || (_locales['zh-TW'] && _locales['zh-TW'][key]) || key;
  if (params) { Object.keys(params).forEach(function(k) { s = s.replace('{' + k + '}', params[k]); }); }
  return s;
}
function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(function(el) { el.textContent = t(el.getAttribute('data-i18n')); });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(function(el) { el.placeholder = t(el.getAttribute('data-i18n-placeholder')); });
  document.documentElement.lang = _lang === 'vi' ? 'vi' : _lang === 'en' ? 'en' : 'zh-TW';
}
function toggleRLangMenu() { document.getElementById('rLangMenu').classList.toggle('open'); }
function changeRLang(lang) {
  _lang = lang; localStorage.setItem('obsbot-lang', lang);
  document.getElementById('rLangMenu').classList.remove('open');
  document.getElementById('rLangBtn').textContent = _langFlags[lang] || '🌐';
  document.querySelectorAll('.lang-sw-opt').forEach(function(el) { el.classList.toggle('active', el.getAttribute('data-lang') === lang); });
  applyI18n(); renderRight();
}
document.addEventListener('click', function(e) { var sw = document.querySelector('.lang-sw'); if (sw && !sw.contains(e.target)) document.getElementById('rLangMenu').classList.remove('open'); });

const S={notes:[],selected:new Set(),topic:'',history:[],overview:null,tab:'overview',folderOpen:{},activeTag:'',allTags:[]};
const $=id=>document.getElementById(id);

async function loadNotes(q){
  const url=q?'/api/research/notes?q='+encodeURIComponent(q):'/api/research/notes';
  const r=await fetch(url);const notes=await r.json();
  S.notes=notes;
  // 收集所有標籤
  const tagSet=new Set();
  notes.forEach(n=>(n.tags||[]).forEach(t=>tagSet.add(t)));
  S.allTags=[...tagSet].sort();
  // 恢復 pending 選取（session restore 時使用）
  if(window._pendingRestorePaths){
    var paths=new Set(window._pendingRestorePaths);
    notes.forEach(n=>{if(paths.has(n.path))S.selected.add(n.path);});
    window._pendingRestorePaths=null;
  }
  renderTags();renderTree();updateSelCount();
  $('status').textContent=t('research.notesCount',{n:notes.length});
}

function getFilteredNotes(){
  if(!S.activeTag)return S.notes;
  return S.notes.filter(n=>(n.tags||[]).includes(S.activeTag));
}

function buildFolderMap(){
  const map={};
  getFilteredNotes().forEach(n=>{
    const f=n.folder||'.';
    if(!map[f])map[f]=[];
    map[f].push(n);
  });
  return map;
}

function renderTags(){
  const el=$('tagBar');
  if(!S.allTags.length){el.innerHTML='';el.className='';return;}
  el.className='tag-bar';
  el.innerHTML='<span class="tag-chip'+(S.activeTag?'':' on')+'" onclick="setTag(\'\')">'+t('research.allTags')+'</span>'
    +S.allTags.slice(0,20).map(t=>'<span class="tag-chip'+(S.activeTag===t?' on':'')+'" onclick="setTag(\''+esc(t.replace(/'/g,"\\'"))+'\')">'+esc(t)+'</span>').join('');
}

function setTag(t){S.activeTag=S.activeTag===t?'':t;renderTags();renderTree();}

function renderTree(){
  const el=$('noteList');
  const map=buildFolderMap();
  const folders=Object.keys(map).sort();
  if(!folders.length){el.innerHTML='<div class="empty">'+t('research.noNotes')+'</div>';return;}
  let html='';
  for(const folder of folders){
    const files=map[folder];
    const isOpen=S.folderOpen[folder]!==false;
    const selCt=files.filter(f=>S.selected.has(f.path)).length;
    const chkCls=selCt===files.length&&files.length>0?'all':selCt>0?'part':'';
    const chkTxt=selCt===files.length&&files.length>0?'✓':selCt>0?'−':'';
    const label=folder==='.'?t('research.rootFolder'):folder.split('/').pop();
    html+='<div>';
    html+='<div class="folder-hdr" onclick="toggleFolder(\''+esc(folder.replace(/'/g,"\\'"))+'\')">';
    html+='<span class="folder-arrow'+(isOpen?' open':'')+'">▶</span>';
    html+='<span>📁</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(label)+'</span>';
    html+='<span class="folder-ct">'+files.length+'</span>';
    html+='<div class="folder-chk '+chkCls+'" onclick="event.stopPropagation();toggleFolderSel(\''+esc(folder.replace(/'/g,"\\'"))+'\')">'+chkTxt+'</div>';
    html+='</div>';
    if(isOpen){
      html+='<div class="folder-children">';
      for(const f of files){
        const sel=S.selected.has(f.path);
        var ep=esc(f.path.replace(/'/g,"\\'"));
        html+='<div class="note-item'+(sel?' selected':'')+'" onclick="toggleNote(\''+ep+'\')">';
        html+='<div class="note-chk'+(sel?' on':'')+'">'+(sel?'✓':'')+'</div>';
        html+='<span style="font-size:13px;flex-shrink:0">📝</span>';
        html+='<span class="note-name" title="'+esc(f.name)+'">'+esc(f.name)+'</span>';
        if((f.tags||[]).length>0)html+='<span class="note-tags-dot"></span>';
        html+='<button class="note-act-btn" onclick="event.stopPropagation();openNoteCtx(\''+ep+'\',this)" title="操作">⋯</button>';
        html+='</div>';
      }
      html+='</div>';
    }
    html+='</div>';
  }
  el.innerHTML=html;
}

function toggleFolder(f){S.folderOpen[f]=S.folderOpen[f]===false?true:false;renderTree();}

function toggleFolderSel(f){
  const map=buildFolderMap();
  const files=map[f]||[];
  const allSel=files.every(n=>S.selected.has(n.path));
  files.forEach(n=>{if(allSel)S.selected.delete(n.path);else S.selected.add(n.path);});
  renderTree();updateSelCount();
}

function updateSelCount(){
  var n=S.selected.size;
  $('selCount').textContent=n;
  var b=$('selBadge');
  if(b){if(n>0){b.textContent='已選 '+n+' 篇';b.style.display='';}else b.style.display='none';}

function renderEmpty(){
  if(S.history.length>0)return;
  var hasNotes=S.selected.size>0;
  var hasTopic=($('topic').value||'').trim().length>0;
  function stepCard(num,label,detail,done,active){
    var cls=done?'done':active?'active':'';
    return'<div class="step-card '+cls+'">'
      +'<div class="step-num">'+(done?'✓':num)+'</div>'
      +'<div><div class="step-label">'+label+'</div><div class="step-detail">'+detail+'</div></div>'
      +'</div>';
  }
  var s1done=hasNotes,s2done=hasTopic;
  var s1active=!s1done,s2active=s1done&&!s2done,s3active=s1done&&s2done;
  var s1detail=hasNotes?'已選 '+S.selected.size+' 篇筆記':'從左側 Vault 勾選要分析的筆記';
  var s2detail=hasTopic?'「'+($('topic').value||'').trim()+'」':'輸入你想深入研究的主題';
  var s3detail=s3active?'點擊右上角「分析」按鈕開始':'完成前兩步後即可分析';
  $('messages').innerHTML='<div class="steps-wrap">'
    +'<div style="font-size:36px;opacity:.12;margin-bottom:2px">⚡</div>'
    +'<div style="font-size:17px;font-weight:700;color:var(--txt1);margin-bottom:2px">本機 AI 研究助手</div>'
    +'<div style="font-size:12px;color:var(--txt3);margin-bottom:8px">按照步驟開始研究</div>'
    +stepCard(1,'選擇筆記',s1detail,s1done,s1active)
    +stepCard(2,'輸入研究主題',s2detail,s2done,s2active)
    +stepCard(3,'開始分析',s3detail,false,s3active)
    +'</div>';
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function renderMd(s){
  if(!s)return'';
  // 將 Obsidian wikilink [[...]] 轉為可點擊連結
  var t=(s||'').replace(/\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g,function(_,link,alias){
    var display=alias||link;
    return '<a class="wikilink" href="javascript:void(0)" onclick="openNoteModal(\''+link.replace(/'/g,"\\'")+'\')">'+(display)+'</a>';
  });
  if(typeof marked!=='undefined'){
    marked.setOptions({breaks:true,gfm:true});
    return marked.parse(t);
  }
  return'<p>'+esc(s).replace(/\n/g,'<br>')+'</p>';
}

async function openNoteModal(name){

/* ── 筆記管理 ─────────────────────────────────────────────── */
var _ctxPath=null;

function openNoteCtx(path,btn){
  _ctxPath=path;
  var menu=$('noteCtxMenu');
  var rect=btn.getBoundingClientRect();
  var left=Math.min(rect.left,window.innerWidth-160);
  var top=rect.bottom+4;
  if(top+160>window.innerHeight)top=rect.top-164;
  menu.style.top=top+'px';menu.style.left=left+'px';
  menu.classList.add('open');
  setTimeout(function(){document.addEventListener('click',_closeCtxOnce,{once:true});},0);
}
function _closeCtxOnce(){$('noteCtxMenu').classList.remove('open');}

function ctxAction(action){
  $('noteCtxMenu').classList.remove('open');
  document.removeEventListener('click',_closeCtxOnce);
  if(!_ctxPath)return;
  // 若被操作的筆記已在多選清單中，move/delete 自動升級批次模式
  var isBatch=S.selected.has(_ctxPath)&&S.selected.size>1;
  if(action==='view')openNoteByPath(_ctxPath);
  else if(action==='move'){if(isBatch)openBatchMove();else openMoveDialog(_ctxPath);}
  else if(action==='rename')openRenameDialog(_ctxPath);
  else if(action==='delete'){if(isBatch)openBatchDelete();else openDeleteDialog(_ctxPath);}
}

async function openNoteByPath(path){
  var name=path.split('/').pop().replace(/\.md$/i,'');
  var modal=$('noteModal');
  $('noteModalTitle').textContent=name;
  $('noteModalBody').innerHTML='<div class="loading">載入中…</div>';
  modal.classList.add('open');
  try{
    var r=await fetch('/api/vault/note?path='+encodeURIComponent(path));
    var d=await r.json();
    if(d.error){$('noteModalBody').innerHTML='<div class="empty">'+esc(d.error)+'</div>';return;}
    $('noteModalBody').innerHTML=renderMd(d.body);
  }catch(e){$('noteModalBody').innerHTML='<div class="empty">載入失敗：'+esc(e.message)+'</div>';}
}

async function openMoveDialog(path){
  _ctxPath=path;
  $('folderList').innerHTML='<div class="loading">載入資料夾…</div>';
  $('moveDialog').classList.add('open');
  try{
    var r=await fetch('/api/vault/folders');
    var folders=await r.json();
    var curFolder=path.split('/').slice(0,-1).join('/')||'.';
    var opts=folders.filter(function(f){return f!==curFolder;}).map(function(f){
      var label=f==='.'?'（根目錄）':f;
      return'<div class="folder-opt" onclick="submitMove(\''+esc(f.replace(/'/g,"\\'")+'\')">📁 '+esc(label)+'</div>';
    }).join('');
    $('folderList').innerHTML=opts||'<div class="empty">沒有其他資料夾</div>';
  }catch(e){$('folderList').innerHTML='<div class="empty">載入失敗</div>';}
}
function closeMoveDialog(){$('moveDialog').classList.remove('open');}

async function submitMove(folder){
  closeMoveDialog();
  // 批次模式：_ctxPath === null 時移動所有已選
  var paths=_ctxPath?[_ctxPath]:Array.from(S.selected);
  if(paths.length===0)return;
  try{
    for(var i=0;i<paths.length;i++){
      var p=paths[i];
      var r=await fetch('/api/vault/note/move?path='+encodeURIComponent(p),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({folder})});
      var d=await r.json();
      if(d.error){alert('移動失敗（'+p.split('/').pop()+'）：'+d.error);continue;}
      if(S.selected.has(p)){S.selected.delete(p);S.selected.add(d.newPath);}
    }
    await fetch('/api/research/rescan',{method:'POST'});
    loadNotes($('search').value);updateSelCount();
  }catch(e){alert('移動失敗：'+e.message);}
}

function openRenameDialog(path){
  _ctxPath=path;
  var name=path.split('/').pop().replace(/\.md$/i,'');
  $('renameInput').value=name;
  $('renameDialog').classList.add('open');
  setTimeout(function(){$('renameInput').focus();$('renameInput').select();},60);
}
function closeRenameDialog(){$('renameDialog').classList.remove('open');}

async function submitRename(){
  var newName=($('renameInput').value||'').trim();
  if(!newName||!_ctxPath)return;
  closeRenameDialog();
  try{
    var r=await fetch('/api/vault/note?path='+encodeURIComponent(_ctxPath),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:newName})});
    var d=await r.json();
    if(d.error){alert('改名失敗：'+d.error);return;}
    if(S.selected.has(_ctxPath)){S.selected.delete(_ctxPath);S.selected.add(d.newPath);}
    await fetch('/api/research/rescan',{method:'POST'});
    loadNotes($('search').value);updateSelCount();
  }catch(e){alert('改名失敗：'+e.message);}
}

async function submitDelete(){
  closeDeleteDialog();
  // 批次模式：_ctxPath === null 時刪除所有已選
  var paths=_ctxPath?[_ctxPath]:Array.from(S.selected);
  if(paths.length===0)return;
  try{
    for(var i=0;i<paths.length;i++){
      var p=paths[i];
      var r=await fetch('/api/vault/note?path='+encodeURIComponent(p),{method:'DELETE'});

async function analyze(){
  const topic=$('topic').value.trim();if(!topic)return;
  if(isMobile())switchMobTab('chat');
  S.topic=topic;S.history=[];
  $('messages').innerHTML='<div class="loading">'+t('research.analyzing')+'</div>';
  try{
    const r=await fetch('/api/research/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({topic,paths:[...S.selected]})});
    const d=await r.json();S.overview=d.overview;
    const overviewText=d.overview?.summary
      ?t('research.analyzeLoaded',{n:d.noteCount})+'\n\n'+d.overview.summary
      :t('research.analyzeLoaded',{n:d.noteCount})+'\n\n⚠️ AI 分析未能解析（LLM 可能未回應或格式錯誤），請稍後重試。';
    S.history=[{role:'assistant',content:overviewText}];
    renderMessages();renderRight();saveSession();
  }catch(e){$('messages').innerHTML='<div class="msg assistant">'+t('research.analyzeFail')+esc(e.message)+'</div>';}
}

async function sendMsg(){
  const txt=$('chatInput').value.trim();if(!txt||!S.topic)return;
  if(isMobile())switchMobTab('chat');
  $('chatInput').value='';
  S.history.push({role:'user',content:txt});renderMessages();
  const msgEl=document.createElement('div');msgEl.className='msg';
  msgEl.innerHTML='<div class="msg-ava ai">'+t('research.avatarAI')+'</div><div class="msg-body"><div class="msg-role">'+t('research.roleAI')+'</div><div class="msg-text" style="color:var(--txt3)">'+t('research.thinking')+'</div></div>';
  $('messages').appendChild(msgEl);$('messages').scrollTop=$('messages').scrollHeight;
  try{
    const r=await fetch('/api/research/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({topic:S.topic,paths:[...S.selected],history:S.history,message:txt})});
    const d=await r.json();
    S.history.push({role:'assistant',content:d.reply});
    renderMessages();saveSession();
  }catch(e){msgEl.querySelector('.msg-text').textContent=t('research.error')+e.message;}
}

    h+='<div class="overview-section"><h3>'+t('research.keyConcepts')+'</h3>'+(S.overview.keyConcepts||[]).map(c=>'<div class="overview-item">'+esc(c)+'</div>').join('')+'</div>';

      {icon:'✏️',labelKey:'research.tool.outline',tool:'outline'},

    const promptTools=[
      {icon:'🗺️',labelKey:'research.tool.knowledgeMap',promptKey:'research.prompt.knowledgeMap'},
      {icon:'❓',labelKey:'research.tool.gaps',promptKey:'research.prompt.gaps'},
      {icon:'📝',labelKey:'research.tool.pptxOutline',promptKey:'research.prompt.pptxOutline'},
      {icon:'🧠',labelKey:'research.tool.mindmap',promptKey:'research.prompt.mindmap'},
      {icon:'📰',labelKey:'research.tool.infographic',promptKey:'research.prompt.infographic'},
      {icon:'🎙️',labelKey:'research.tool.podcast',promptKey:'research.prompt.podcast'},
      {icon:'📧',labelKey:'research.tool.execSummary',promptKey:'research.prompt.execSummary'},
    ];
    var noAnalysis=!S.overview,noTopic=!S.topic;
    var eDis=noTopic?' disabled':'',tDis=noAnalysis?' disabled':'';

    h+='<button class="tool-btn'+eDis+'" onclick="exportPptx()"><span class="icon">📥</span>'+t('research.downloadPptx')+'</button></div>';

function askQuestion(q){$('chatInput').value=q;sendMsg();}

function sendPromptTool(idx){
  if(!S.topic){alert(t('research.noTopic'));return;}
  const p=window._promptTools[idx];if(!p)return;
  $('chatInput').value=p.prompt;sendMsg();

async function runTool(tool){
  if(!S.topic){alert(t('research.noTopic'));return;}
  const msgEl=document.createElement('div');msgEl.className='msg';
  msgEl.innerHTML='<div class="msg-ava ai">'+t('research.avatarAI')+'</div><div class="msg-body"><div class="msg-role">'+t('research.roleAI')+'</div><div class="msg-text" style="color:var(--txt3)">'+t('research.generating')+'</div></div>';
  $('messages').appendChild(msgEl);$('messages').scrollTop=$('messages').scrollHeight;
  try{
    const r=await fetch('/api/research/tools/'+tool,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({topic:S.topic,paths:[...S.selected]})});
    const d=await r.json();
    S.history.push({role:'assistant',content:d.result});renderMessages();
    var last=$('messages').lastElementChild;if(last)last.scrollIntoView({behavior:'smooth',block:'start'});
  }catch(e){msgEl.querySelector('.msg-text').textContent=t('research.generateFail')+e.message;}
}

async function copyMsg(idx,btn){
  var msg=S.history[idx];if(!msg)return;
  try{
    await navigator.clipboard.writeText(msg.content);
    var orig=btn.innerHTML;btn.innerHTML='✅ 已複製';
    setTimeout(()=>{btn.innerHTML=orig;},1500);
  }catch(e){alert('複製失敗：'+e.message);}
}

async function saveAllToVault(btn){
  if(!S.topic||!S.history.filter(m=>m.role==='assistant').length){alert('尚無可儲存的對話');return;}
  btn.textContent='儲存中…';btn.disabled=true;

    var r=await fetch('/api/research/save-all',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({topic:S.topic,history:S.history})});

    if(d.path){btn.textContent='✅ 已存入';btn.style.background='#1b4332';btn.style.color='#fff';showVaultToast(d.path);}
    else{btn.textContent='❌ 失敗';btn.disabled=false;}

function showVaultToast(path){
  var t=document.getElementById('vaultToast');
  var name=path.split('/').pop()||path;

async function saveMsgToVault(idx,btn,toolType){
  var msg=S.history[idx];

  btn.textContent='儲存中…';btn.disabled=true;
  try{
    var r=await fetch('/api/research/save-report',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({topic:S.topic,content:msg.content,toolType:toolType||'chat'})});

  }catch(e){btn.textContent='❌ '+e.message;btn.disabled=false;}
}

async function exportPreview(){
  if(!S.topic)return;
  const content=S.history.filter(m=>m.role==='assistant').map(m=>m.content).join('\n\n');
  const form=document.createElement('form');form.method='POST';form.action='/api/research/export/preview';form.target='_blank';
  const inp=document.createElement('input');inp.type='hidden';inp.name='json';
  inp.value=JSON.stringify({content,topic:S.topic});form.appendChild(inp);

async function exportPptx(){
  if(!S.topic)return;
  const content=S.history.filter(m=>m.role==='assistant').map(m=>m.content).join('\n\n');
  try{
    const r=await fetch('/api/research/export/pptx',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content,topic:S.topic})});
    const blob=await r.blob();const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='research.pptx';a.click();URL.revokeObjectURL(url);
  }catch(e){alert(t('research.exportFail')+e.message);}
}

/* ── Multi-session persistence（後端 API，跨 domain 共享） ── */
var MAX_SESSIONS=30;
var _sessions=[];

async function initSessions(){
  try{var r=await fetch('/api/research/sessions');_sessions=await r.json();}catch(e){_sessions=[];}
  updateHistoryBadge();
}
function getSessions(){return _sessions;}
function _saveSessions(arr){
  _sessions=arr;
  fetch('/api/research/sessions',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(arr)}).catch(function(){});
}
function saveSession(){
  if(!S.topic||!S.history.length)return;
  var sessions=getSessions();
  var idx=sessions.findIndex(function(s){return s.topic===S.topic;});
  var sess={
    id:idx>=0?sessions[idx].id:(Date.now().toString(36)+Math.random().toString(36).slice(2,5)),
    topic:S.topic,history:S.history,overview:S.overview,
    selectedPaths:[...S.selected],savedAt:Date.now(),msgCount:S.history.length
  };
  if(idx>=0){sessions[idx]=sess;}else{sessions.unshift(sess);}
  if(sessions.length>MAX_SESSIONS)sessions=sessions.slice(0,MAX_SESSIONS);
  _saveSessions(sessions);
  updateHistoryBadge();
}

function deleteSession(id){
  _saveSessions(getSessions().filter(function(s){return s.id!==id;}));
  renderSessionsPanel();updateHistoryBadge();
}

function clearAllSessions(){
  if(!confirm('確定要清除所有歷史研究記錄？'))return;
  _saveSessions([]);renderSessionsPanel();updateHistoryBadge();
}

function loadSessionById(id){
  var sess=getSessions().find(function(s){return s.id===id;});
  if(!sess)return;
  S.topic=sess.topic;S.history=sess.history;S.overview=sess.overview||null;
  $('topic').value=sess.topic;
  window._pendingRestorePaths=sess.selectedPaths||[];
  if(S.notes.length){
    var paths=new Set(window._pendingRestorePaths);
    S.notes.forEach(function(n){if(paths.has(n.path))S.selected.add(n.path);});
    window._pendingRestorePaths=null;
    renderTree();updateSelCount();
  }
  renderMessages();renderRight();
  closeSessionsPanel();
}

function toggleSessionsPanel(){
  var panel=$('sessionsPanel');
  if(panel.classList.contains('open')){closeSessionsPanel();}else{openSessionsPanel();}
}
function openSessionsPanel(){renderSessionsPanel();$('sessionsPanel').classList.add('open');}
function closeSessionsPanel(){$('sessionsPanel').classList.remove('open');}

function renderSessionsPanel(){
  var sessions=getSessions();
  var el=$('sessionsList');if(!el)return;
  if(!sessions.length){
    el.innerHTML='<div class="sessions-empty">尚無儲存的研究記錄<br><small>分析或對話後會自動儲存，最多保留 '+MAX_SESSIONS+' 筆</small></div>';
    return;
  }
  el.innerHTML=sessions.map(function(s){
    var d=new Date(s.savedAt);
    var dateStr=d.getFullYear()+'/'+(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getDate().toString().padStart(2,'0')
      +' '+d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
    var msgCt=s.history?s.history.filter(function(m){return m.role==='user';}).length:0;
    var noteCt=(s.selectedPaths||[]).length;
    return '<div class="session-item">'
      +'<div class="session-info">'
      +'<div class="session-topic">'+esc(s.topic)+'</div>'
      +'<div class="session-meta">'+dateStr+' · '+msgCt+' 個問題 · '+noteCt+' 篇筆記</div>'
      +'</div>'
      +'<button class="session-load" onclick="loadSessionById(\''+s.id+'\')">繼續研究</button>'
      +'<button class="session-del" onclick="deleteSession(\''+s.id+'\');event.stopPropagation()" title="刪除">🗑</button>'
      +'</div>';
  }).join('');
}

function updateHistoryBadge(){
  var ct=getSessions().length;
  var badge=$('historyBadge');var btn=$('historyBtn');
  if(!badge||!btn)return;
  if(ct>0){
    badge.textContent=ct;badge.style.display='inline';
    btn.style.borderColor='var(--pu3)';btn.style.color='var(--pu)';
  }else{
    badge.style.display='none';
    btn.style.borderColor='var(--bdr)';btn.style.color='var(--txt3)';
  }
}

/* ── Mobile tabs ── */
function isMobile(){return window.innerWidth<=900;}
function switchMobTab(tab){
  if(!isMobile())return;
  var map={notes:'left',chat:'center',tools:'right'};
  var ids={notes:'mobTabNotes',chat:'mobTabChat',tools:'mobTabTools'};
  ['left','center','right'].forEach(function(c){document.querySelector('.'+c).classList.remove('mob-active');});
  if(map[tab])document.querySelector('.'+map[tab]).classList.add('mob-active');
  Object.keys(ids).forEach(function(k){document.getElementById(ids[k]).classList.toggle('active',k===tab);});
}
window.addEventListener('resize',function(){
  if(!isMobile()){
    ['left','center','right'].forEach(function(c){document.querySelector('.'+c).classList.remove('mob-active');});
  } else if(!document.querySelector('.mob-active')){
    switchMobTab('chat');
  }
});
if(isMobile())switchMobTab('chat');
