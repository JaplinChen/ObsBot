<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ObsBot Research</title>
<script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg0:#f0f2f5;--bg1:#ffffff;--bg2:#f8f9fb;--bg3:#eef0f4;--bdr:#e0e3ea;--bdr2:#cdd2dc;--txt1:#1a1a2e;--txt2:#4a4a6a;--txt3:#8890a4;--gold:#667eea;--gold2:rgba(102,126,234,.12);--gold3:rgba(102,126,234,.30);--pu:#667eea;--pu2:rgba(102,126,234,.10);--pu3:rgba(102,126,234,.25);--gn:#27ae60;--gn2:rgba(39,174,96,.10);--gn3:rgba(39,174,96,.25)}
html,body{height:100%;overflow:hidden;background:var(--bg0);color:var(--txt1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang TC','Microsoft JhengHei',sans-serif;font-size:14px;line-height:1.5}
.app{display:flex;height:100vh;overflow:hidden}
/* 左欄 sidebar */
.left{background:var(--bg1);border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden;width:280px;flex-shrink:0}
.sb-top{padding:12px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:9px;flex-shrink:0}
.sb-icon{width:28px;height:28px;background:var(--pu);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;flex-shrink:0}
.sb-name{font-size:15px;color:var(--txt1);font-weight:600;flex:1}
.sb-sub{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;margin-top:1px}
.back-btn{background:transparent;border:1px solid var(--bdr);border-radius:6px;padding:4px 10px;color:var(--txt3);font-size:12px;cursor:pointer;text-decoration:none;font-family:inherit;transition:all .2s;flex-shrink:0}
.back-btn:hover{border-color:var(--pu3);color:var(--pu)}
.lang-sw{position:relative;flex-shrink:0}
.lang-sw-btn{background:transparent;border:1px solid var(--bdr);border-radius:6px;padding:3px 8px;cursor:pointer;font-size:16px;line-height:1;transition:border-color .2s}
.lang-sw-btn:hover{border-color:var(--pu3)}
.lang-sw-menu{display:none;position:absolute;left:0;top:100%;margin-top:4px;background:var(--bg1);border:1px solid var(--bdr);border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:100;min-width:140px;overflow:hidden}
.lang-sw-menu.open{display:block}
.lang-sw-opt{display:flex;align-items:center;gap:7px;padding:8px 12px;cursor:pointer;font-size:12px;color:var(--txt2);border:none;background:none;width:100%;font-family:inherit;text-align:left;transition:background .15s}
.lang-sw-opt:hover{background:var(--pu2)}
.lang-sw-opt.active{background:var(--pu2);color:var(--pu);font-weight:600}
.search-bar{padding:8px 14px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.search-bar input{width:100%;background:var(--bg0);border:1px solid var(--bdr);border-radius:6px;padding:7px 10px;color:var(--txt1);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s}
.search-bar input:focus{border-color:var(--pu)}
.search-bar input::placeholder{color:var(--txt3)}
/* 標籤列 */
.tag-bar{padding:7px 14px;border-bottom:1px solid var(--bdr);flex-shrink:0;display:flex;flex-wrap:wrap;gap:5px;max-height:68px;overflow-y:auto}
.tag-chip{background:var(--bg0);border:1px solid var(--bdr);border-radius:20px;padding:3px 9px;font-size:11px;color:var(--txt3);cursor:pointer;transition:all .2s;font-weight:500}
.tag-chip.on{background:var(--gold2);border-color:var(--gold3);color:var(--gold)}
.tag-chip:hover:not(.on){color:var(--txt2)}
.note-list{flex:1;overflow-y:auto;padding:6px}
/* 資料夾 */
.folder-hdr{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:6px;cursor:pointer;color:var(--txt3);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;user-select:none;transition:color .2s}
.folder-hdr:hover{color:var(--txt2)}
.folder-arrow{font-size:9px;transition:transform .2s;display:inline-block;width:14px}
.folder-arrow.open{transform:rotate(90deg)}
.folder-ct{font-size:11px;color:var(--txt3);margin-left:auto;font-weight:400;background:var(--bg2);padding:2px 7px;border-radius:10px}
.folder-chk{width:16px;height:16px;border:1.5px solid var(--txt3);border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-size:10px;font-weight:700;cursor:pointer;margin-left:4px;color:transparent;background:var(--bg0)}
.folder-chk:hover{border-color:var(--pu);color:var(--pu);background:var(--pu2)}
.folder-chk.part{background:var(--pu2);border-color:var(--pu3);color:var(--pu)}
.folder-chk.all{background:var(--pu);border-color:var(--pu);color:#fff}
.folder-children{padding-left:11px}
/* 筆記項目 */
.note-item{display:flex;align-items:center;gap:7px;padding:5px 9px;border-radius:6px;cursor:pointer;transition:all .2s;border:1px solid transparent;margin-bottom:2px;font-size:13px}
.note-item:hover{background:var(--bg2)}
.note-item.selected{background:var(--pu2);border-color:var(--pu3)}
.note-chk{width:15px;height:15px;border:1.5px solid var(--bdr2);border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-size:9px;color:transparent}
.note-chk.on{background:var(--pu);border-color:var(--pu);color:#fff}
.note-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--txt2)}
.note-item.selected .note-name{color:var(--pu)}
.note-tags-dot{width:5px;height:5px;border-radius:50%;background:var(--pu);flex-shrink:0;opacity:.6}
/* 底部狀態列 */
.bot-bar{padding:9px 14px;border-top:1px solid var(--bdr);flex-shrink:0;display:flex;gap:7px;align-items:center}
.bot-bar .sel-ct{font-size:12px;color:var(--txt2);flex:1}
.bot-bar .sel-ct b{color:var(--pu);font-weight:700}
.bot-bar .clr{background:none;border:none;color:var(--txt3);font-size:12px;cursor:pointer;font-family:inherit}
.bot-bar .clr:hover{color:var(--txt2)}
/* 中欄 */
.center{display:flex;flex-direction:column;overflow:hidden;background:var(--bg0);flex:1;min-width:0}
.topic-bar{padding:11px 20px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:9px;background:var(--bg1);flex-shrink:0}
.topic-bar input{flex:1;background:var(--bg0);border:1px solid var(--bdr2);border-radius:8px;padding:9px 13px;color:var(--txt1);font-size:15px;font-style:italic;font-family:inherit;outline:none;transition:border-color .2s}
.topic-bar input:focus{border-color:var(--gold)}
.topic-bar input::placeholder{color:var(--txt3);font-style:italic}
.topic-bar button{background:var(--pu);border:none;border-radius:8px;padding:9px 16px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;transition:opacity .2s}
.topic-bar button:hover{opacity:.88}
.messages{flex:1;overflow-y:auto;padding:22px 26px;display:flex;flex-direction:column;gap:24px}
.msg{display:flex;gap:10px;animation:fu .22s ease}
@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.msg-ava{width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:2px}
.msg-ava.ai{background:var(--pu2);color:var(--pu);border:1px solid var(--pu3)}
.msg-ava.user{background:var(--bg2);color:var(--txt2);border:1px solid var(--bdr)}
.msg-body{flex:1;min-width:0}
.msg-role{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;color:var(--txt3)}
.msg-text{color:var(--txt2);font-size:14px;line-height:1.85}
/* Markdown 渲染樣式 */
.msg-text h1,.msg-text h2,.msg-text h3,.msg-text h4{color:var(--txt1);margin:16px 0 8px;line-height:1.4}
.msg-text h1{font-size:1.4em;border-bottom:1px solid var(--bdr);padding-bottom:6px}
.msg-text h2{font-size:1.2em;border-bottom:1px solid var(--bdr);padding-bottom:4px}
.msg-text h3{font-size:1.05em}
.msg-text h4{font-size:1em}
.msg-text p{margin:8px 0}
.msg-text ul,.msg-text ol{margin:8px 0;padding-left:24px}
.msg-text li{margin:3px 0}
.msg-text li>p{margin:2px 0}
.msg-text strong{color:var(--txt1);font-weight:600}
.msg-text em{font-style:italic}
.msg-text blockquote{border-left:3px solid var(--pu);margin:10px 0;padding:6px 14px;background:var(--pu2);border-radius:0 6px 6px 0;color:var(--txt2)}
.msg-text code{background:var(--bg3);padding:1px 5px;border-radius:4px;font-size:0.9em;font-family:'SF Mono',Monaco,Menlo,monospace}
.msg-text pre{background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;padding:12px;margin:10px 0;overflow-x:auto}
.msg-text pre code{background:none;padding:0;font-size:0.85em}
.msg-text a{color:var(--pu);text-decoration:none}
.msg-text a:hover{text-decoration:underline}
.msg-text table{border-collapse:collapse;margin:10px 0;width:100%;font-size:13px}
.msg-text th,.msg-text td{border:1px solid var(--bdr);padding:6px 10px;text-align:left}
.msg-text th{background:var(--bg3);font-weight:600;color:var(--txt1)}
.msg-text tr:nth-child(even){background:var(--bg2)}
.msg-text hr{border:none;border-top:1px solid var(--bdr);margin:16px 0}
.msg-text .wikilink{color:var(--pu);background:var(--pu2);padding:1px 6px;border-radius:4px;font-size:0.92em;cursor:pointer;text-decoration:none;display:inline}
.msg-text .wikilink:hover{background:var(--pu3);text-decoration:underline}
/* 筆記預覽 modal */
.note-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;justify-content:center;align-items:center}
.note-modal-overlay.open{display:flex}
.note-modal{background:var(--bg1);border-radius:12px;width:min(800px,90vw);max-height:85vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.note-modal-hdr{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.note-modal-hdr h2{flex:1;font-size:16px;color:var(--txt1);margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.note-modal-hdr button{background:none;border:none;font-size:20px;cursor:pointer;color:var(--txt3);padding:4px 8px;border-radius:6px}
.note-modal-hdr button:hover{background:var(--bg0);color:var(--txt1)}
.note-modal-body{flex:1;overflow-y:auto;padding:20px 24px;color:var(--txt2);font-size:14px;line-height:1.85}
.note-modal-body h1,.note-modal-body h2,.note-modal-body h3,.note-modal-body h4{color:var(--txt1);margin:16px 0 8px;line-height:1.4}
.note-modal-body h1{font-size:1.4em;border-bottom:1px solid var(--bdr);padding-bottom:6px}
.note-modal-body h2{font-size:1.2em;border-bottom:1px solid var(--bdr);padding-bottom:4px}
.note-modal-body p{margin:8px 0}
.note-modal-body ul,.note-modal-body ol{margin:8px 0;padding-left:24px}
.note-modal-body li{margin:3px 0}
.note-modal-body strong{color:var(--txt1);font-weight:600}
.note-modal-body blockquote{border-left:3px solid var(--pu);margin:10px 0;padding:6px 14px;background:var(--pu2);border-radius:0 6px 6px 0}
.note-modal-body code{background:var(--bg3);padding:1px 5px;border-radius:4px;font-size:0.9em;font-family:'SF Mono',Monaco,Menlo,monospace}
.note-modal-body pre{background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;padding:12px;margin:10px 0;overflow-x:auto}
.note-modal-body pre code{background:none;padding:0}
.note-modal-body table{border-collapse:collapse;margin:10px 0;width:100%;font-size:13px}
.note-modal-body th,.note-modal-body td{border:1px solid var(--bdr);padding:6px 10px;text-align:left}
.note-modal-body th{background:var(--bg3);font-weight:600;color:var(--txt1)}
.note-modal-body a{color:var(--pu);text-decoration:none}
.note-modal-body a:hover{text-decoration:underline}
.note-modal-body .wikilink{color:var(--pu);background:var(--pu2);padding:1px 6px;border-radius:4px;font-size:0.92em;cursor:pointer}
.note-modal-body .wikilink:hover{background:var(--pu3);text-decoration:underline}
/* 右欄 markdown */
.overview-item h1,.overview-item h2,.overview-item h3{font-size:12px;color:var(--txt1);margin:6px 0 3px}
.overview-item p{margin:4px 0}
.overview-item ul,.overview-item ol{padding-left:18px;margin:4px 0}
.overview-item strong{color:var(--txt1)}
.chat-input{padding:11px 20px 16px;border-top:1px solid var(--bdr);flex-shrink:0}
.chat-wrap{display:flex;gap:8px;background:var(--bg1);border:1px solid var(--bdr2);border-radius:12px;padding:8px 8px 8px 14px;align-items:flex-end;transition:border-color .2s}
.chat-wrap:focus-within{border-color:var(--gold)}
.chat-wrap textarea{flex:1;background:transparent;border:none;outline:none;color:var(--txt1);font-size:14px;font-family:inherit;resize:none;line-height:1.6;min-height:22px;max-height:100px}
.chat-wrap textarea::placeholder{color:var(--txt3)}
.chat-wrap button{background:var(--pu);border:none;border-radius:8px;width:33px;height:33px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .2s;color:#fff;font-size:14px;font-weight:700}
.chat-wrap button:hover{opacity:.85}
/* 右欄 */
.right{background:var(--bg1);border-left:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden;width:320px;flex-shrink:0}
.right-tabs{display:flex;border-bottom:1px solid var(--bdr);flex-shrink:0}
.right-tabs button{flex:1;padding:11px 4px;font-size:11.5px;font-weight:700;text-align:center;cursor:pointer;color:var(--txt3);border:none;background:transparent;border-bottom:2px solid transparent;transition:all .2s;text-transform:uppercase;letter-spacing:.3px;font-family:inherit}
.right-tabs button.active{color:var(--gold);border-bottom-color:var(--gold)}
.right-tabs button:hover:not(.active){color:var(--txt2)}
.right-content{flex:1;overflow-y:auto;padding:14px}
.overview-section{margin-bottom:20px}
.overview-section h3{font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;font-weight:700;margin-bottom:9px}
.overview-item{background:var(--bg0);border:1px solid var(--bdr);border-radius:8px;padding:9px 11px;margin-bottom:6px;font-size:12.5px;cursor:pointer;color:var(--txt2);transition:all .2s;line-height:1.55}
.overview-item:hover{border-color:var(--bdr2);color:var(--txt1)}
.tool-btn{width:100%;background:transparent;border:1px solid var(--bdr2);border-radius:8px;padding:10px 12px;color:var(--txt2);font-size:13px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:9px;transition:all .2s;margin-bottom:6px;text-align:left}
.tool-btn:hover{border-color:var(--gold3);color:var(--gold)}
.tool-btn .icon{font-size:16px;flex-shrink:0}
.loading{color:var(--txt3);font-size:13px;padding:10px;text-align:center}
.empty{color:var(--txt3);font-size:13px;padding:20px;text-align:center}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--txt3)}
@media(max-width:900px){.app{flex-direction:column}.left,.right{display:none}}
/* Theme toggle */
.theme-sw-btn{background:transparent;border:1px solid var(--bdr);border-radius:6px;padding:3px 8px;cursor:pointer;font-size:15px;line-height:1;transition:all .2s;flex-shrink:0}
.theme-sw-btn:hover{border-color:var(--pu3);transform:scale(1.08)}
/* Dark mode tokens */
[data-theme="dark"]{--bg0:#0f0f1a;--bg1:#1c1c2e;--bg2:#252538;--bg3:#2e2e48;--bdr:#383858;--bdr2:#4a4a6a;--txt1:#e2e4f0;--txt2:#9094b0;--txt3:#606880}
</style>
</head>
<body>
<div class="app">
  <div class="left">
    <div class="sb-top">
      <div class="sb-icon">⚡</div>
      <div style="flex:1;min-width:0"><div class="sb-name" data-i18n="research.title">Vault Research</div><div class="sb-sub" data-i18n="research.subtitle">本機 AI × Obsidian</div></div>
      <button class="theme-sw-btn" onclick="toggleDarkMode()" id="themeBtn" title="切換深色／淺色">🌙</button>
      <div class="lang-sw">
        <button class="lang-sw-btn" onclick="toggleRLangMenu()" id="rLangBtn" title="Language">🇹🇼</button>
        <div class="lang-sw-menu" id="rLangMenu">
          <button class="lang-sw-opt active" data-lang="zh-TW" onclick="changeRLang('zh-TW')">🇹🇼 繁體中文</button>
          <button class="lang-sw-opt" data-lang="en" onclick="changeRLang('en')">🇺🇸 English</button>
          <button class="lang-sw-opt" data-lang="vi" onclick="changeRLang('vi')">🇻🇳 Tiếng Việt</button>
        </div>
      </div>
      <a href="/" class="back-btn" data-i18n="research.back">← 管理</a>
    </div>
    <div class="search-bar"><input id="search" data-i18n-placeholder="research.search" placeholder="搜尋筆記…" /></div>
    <div id="tagBar"></div>
    <div class="note-list" id="noteList"><div class="empty" data-i18n="research.scanning">正在掃描 Vault…</div></div>
    <div class="bot-bar">
      <span class="sel-ct"><b id="selCount">0</b> <span data-i18n="research.selected"> 篇已選</span></span>
      <button class="clr" onclick="clearSelection()" data-i18n="research.clear">清除</button>
    </div>
  </div>
  <div class="center">
    <div class="topic-bar">
      <input id="topic" data-i18n-placeholder="research.topicPlaceholder" placeholder="輸入研究主題…" onkeydown="if(event.key==='Enter')analyze()" />
      <span id="status" style="font-size:11px;color:var(--txt3);white-space:nowrap"></span>
      <button id="analyzeBtn" onclick="analyze()" data-i18n="research.analyze">分析</button>
    </div>
    <div class="messages" id="messages">
      <div class="empty" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:9px">
        <div style="font-size:48px;opacity:.15">⚡</div>
        <div style="font-size:18px;font-weight:600" data-i18n="research.heroTitle">本機 AI 研究助手</div>
        <div style="font-size:13px;color:var(--txt2);max-width:340px;text-align:center;line-height:1.8" data-i18n="research.heroDesc">開啟左側 Vault，勾選筆記，輸入研究主題後開始分析</div>
      </div>
    </div>
    <div class="chat-input">
      <div class="chat-wrap">
        <textarea id="chatInput" rows="1" data-i18n-placeholder="research.chatPlaceholder" placeholder="詢問問題…（Enter 送出）" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
        <button onclick="sendMsg()">▶</button>
      </div>
    </div>
  </div>
  <div class="right">
    <div class="right-tabs">
      <button class="active" onclick="switchTab(this,'overview')" data-i18n="research.tabOverview">概覽</button>
      <button onclick="switchTab(this,'tools')" data-i18n="research.tabTools">工具</button>
      <button onclick="switchTab(this,'slides')" data-i18n="research.tabSlides">投影片</button>
    </div>
    <div class="right-content" id="rightContent">
      <div class="empty" data-i18n="research.emptyOverview">分析後顯示概覽</div>
    </div>
  </div>
</div>
<div class="note-modal-overlay" id="noteModal" onclick="if(event.target===this)closeNoteModal()">
  <div class="note-modal">
    <div class="note-modal-hdr"><h2 id="noteModalTitle"></h2><button onclick="closeNoteModal()">✕</button></div>
    <div class="note-modal-body" id="noteModalBody"></div>
  </div>
</div>
<script>
/* ── i18n engine ── */
/* __LOCALES_INJECT__ */
/* ── Dark mode (sync with admin) ── */
var _darkMode = localStorage.getItem('obsbot-theme') === 'dark';
function applyDarkMode() {
  document.documentElement.setAttribute('data-theme', _darkMode ? 'dark' : 'light');
  var btn = document.getElementById('themeBtn');
  if (btn) btn.textContent = _darkMode ? '☀️' : '🌙';
}
function toggleDarkMode() {
  _darkMode = !_darkMode;
  localStorage.setItem('obsbot-theme', _darkMode ? 'dark' : 'light');
  applyDarkMode();
}
var _lang = localStorage.getItem('obsbot-lang') || 'zh-TW';
var _langFlags = {'zh-TW':'🇹🇼','en':'🇺🇸','vi':'🇻🇳'};
function t(key, params) {
  var s = (_locales[_lang] && _locales[_lang][key]) || (_locales['zh-TW'] && _locales['zh-TW'][key]) || key;
  if (params) { Object.keys(params).forEach(function(k) { s = s.replace('{' + k + '}', params[k]); }); }
  return s;
}
function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(function(el) { el.textContent = t(el.getAttribute('data-i18n')); });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(function(el) { el.placeholder = t(el.getAttribute('data-i18n-placeholder')); });
  document.documentElement.lang = _lang === 'vi' ? 'vi' : _lang === 'en' ? 'en' : 'zh-TW';
}
function toggleRLangMenu() { document.getElementById('rLangMenu').classList.toggle('open'); }
function changeRLang(lang) {
  _lang = lang; localStorage.setItem('obsbot-lang', lang);
  document.getElementById('rLangMenu').classList.remove('open');
  document.getElementById('rLangBtn').textContent = _langFlags[lang] || '🌐';
  document.querySelectorAll('.lang-sw-opt').forEach(function(el) { el.classList.toggle('active', el.getAttribute('data-lang') === lang); });
  applyI18n(); renderRight();
}
document.addEventListener('click', function(e) { var sw = document.querySelector('.lang-sw'); if (sw && !sw.contains(e.target)) document.getElementById('rLangMenu').classList.remove('open'); });

const S={notes:[],selected:new Set(),topic:'',history:[],overview:null,tab:'overview',folderOpen:{},activeTag:'',allTags:[]};
const $=id=>document.getElementById(id);

async function loadNotes(q){
  const url=q?'/api/research/notes?q='+encodeURIComponent(q):'/api/research/notes';
  const r=await fetch(url);const notes=await r.json();
  S.notes=notes;
  // 收集所有標籤
  const tagSet=new Set();
  notes.forEach(n=>(n.tags||[]).forEach(t=>tagSet.add(t)));
  S.allTags=[...tagSet].sort();
  renderTags();renderTree();updateSelCount();
  $('status').textContent=t('research.notesCount',{n:notes.length});
}

function getFilteredNotes(){
  if(!S.activeTag)return S.notes;
  return S.notes.filter(n=>(n.tags||[]).includes(S.activeTag));
}

function buildFolderMap(){
  const map={};
  getFilteredNotes().forEach(n=>{
    const f=n.folder||'.';
    if(!map[f])map[f]=[];
    map[f].push(n);
  });
  return map;
}

function renderTags(){
  const el=$('tagBar');
  if(!S.allTags.length){el.innerHTML='';el.className='';return;}
  el.className='tag-bar';
  el.innerHTML='<span class="tag-chip'+(S.activeTag?'':' on')+'" onclick="setTag(\'\')">'+t('research.allTags')+'</span>'
    +S.allTags.slice(0,20).map(t=>'<span class="tag-chip'+(S.activeTag===t?' on':'')+'" onclick="setTag(\''+esc(t.replace(/'/g,"\\'"))+'\')">'+esc(t)+'</span>').join('');
}

function setTag(t){S.activeTag=S.activeTag===t?'':t;renderTags();renderTree();}

function renderTree(){
  const el=$('noteList');
  const map=buildFolderMap();
  const folders=Object.keys(map).sort();
  if(!folders.length){el.innerHTML='<div class="empty">'+t('research.noNotes')+'</div>';return;}
  let html='';
  for(const folder of folders){
    const files=map[folder];
    const isOpen=S.folderOpen[folder]!==false;
    const selCt=files.filter(f=>S.selected.has(f.path)).length;
    const chkCls=selCt===files.length&&files.length>0?'all':selCt>0?'part':'';
    const chkTxt=selCt===files.length&&files.length>0?'✓':selCt>0?'−':'';
    const label=folder==='.'?t('research.rootFolder'):folder.split('/').pop();
    html+='<div>';
    html+='<div class="folder-hdr" onclick="toggleFolder(\''+esc(folder.replace(/'/g,"\\'"))+'\')">';
    html+='<span class="folder-arrow'+(isOpen?' open':'')+'">▶</span>';
    html+='<span>📁</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(label)+'</span>';
    html+='<span class="folder-ct">'+files.length+'</span>';
    html+='<div class="folder-chk '+chkCls+'" onclick="event.stopPropagation();toggleFolderSel(\''+esc(folder.replace(/'/g,"\\'"))+'\')">'+chkTxt+'</div>';
    html+='</div>';
    if(isOpen){
      html+='<div class="folder-children">';
      for(const f of files){
        const sel=S.selected.has(f.path);
        html+='<div class="note-item'+(sel?' selected':'')+'" onclick="toggleNote(\''+esc(f.path.replace(/'/g,"\\'"))+'\')">';
        html+='<div class="note-chk'+(sel?' on':'')+'">'+(sel?'✓':'')+'</div>';
        html+='<span style="font-size:13px;flex-shrink:0">📝</span>';
        html+='<span class="note-name" title="'+esc(f.name)+'">'+esc(f.name)+'</span>';
        if((f.tags||[]).length>0)html+='<span class="note-tags-dot"></span>';
        html+='</div>';
      }
      html+='</div>';
    }
    html+='</div>';
  }
  el.innerHTML=html;
}

function toggleFolder(f){S.folderOpen[f]=S.folderOpen[f]===false?true:false;renderTree();}

function toggleFolderSel(f){
  const map=buildFolderMap();
  const files=map[f]||[];
  const allSel=files.every(n=>S.selected.has(n.path));
  files.forEach(n=>{if(allSel)S.selected.delete(n.path);else S.selected.add(n.path);});
  renderTree();updateSelCount();
}

function toggleNote(p){if(S.selected.has(p))S.selected.delete(p);else S.selected.add(p);renderTree();updateSelCount();}

function clearSelection(){S.selected.clear();renderTree();updateSelCount();}

function updateSelCount(){$('selCount').textContent=S.selected.size;}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function renderMd(s){
  if(!s)return'';
  // 將 Obsidian wikilink [[...]] 轉為可點擊連結
  var t=(s||'').replace(/\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g,function(_,link,alias){
    var display=alias||link;
    return '<a class="wikilink" href="javascript:void(0)" onclick="openNoteModal(\''+link.replace(/'/g,"\\'")+'\')">'+(display)+'</a>';
  });
  if(typeof marked!=='undefined'){
    marked.setOptions({breaks:true,gfm:true});
    return marked.parse(t);
  }
  return'<p>'+esc(s).replace(/\n/g,'<br>')+'</p>';
}

async function openNoteModal(name){
  var modal=$('noteModal');
  $('noteModalTitle').textContent=name;
  $('noteModalBody').innerHTML='<div class="loading">載入中…</div>';
  modal.classList.add('open');
  try{
    var r=await fetch('/api/research/note-view?name='+encodeURIComponent(name));
    var d=await r.json();
    if(d.error){$('noteModalBody').innerHTML='<div class="empty">'+esc(d.error)+'</div>';return;}
    $('noteModalTitle').textContent=d.name;
    $('noteModalBody').innerHTML=renderMd(d.body);
  }catch(e){$('noteModalBody').innerHTML='<div class="empty">載入失敗：'+esc(e.message)+'</div>';}
}

function closeNoteModal(){$('noteModal').classList.remove('open');}

async function analyze(){
  const topic=$('topic').value.trim();if(!topic)return;
  S.topic=topic;S.history=[];
  $('messages').innerHTML='<div class="loading">'+t('research.analyzing')+'</div>';
  try{
    const r=await fetch('/api/research/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({topic,paths:[...S.selected]})});
    const d=await r.json();S.overview=d.overview;
    S.history=[{role:'assistant',content:t('research.analyzeLoaded',{n:d.noteCount})+'\n\n'+(d.overview?.summary||t('research.analyzeDone'))}];
    renderMessages();renderRight();
  }catch(e){$('messages').innerHTML='<div class="msg assistant">'+t('research.analyzeFail')+esc(e.message)+'</div>';}
}

async function sendMsg(){
  const txt=$('chatInput').value.trim();if(!txt||!S.topic)return;
  $('chatInput').value='';
  S.history.push({role:'user',content:txt});renderMessages();
  const msgEl=document.createElement('div');msgEl.className='msg';
  msgEl.innerHTML='<div class="msg-ava ai">'+t('research.avatarAI')+'</div><div class="msg-body"><div class="msg-role">'+t('research.roleAI')+'</div><div class="msg-text" style="color:var(--txt3)">'+t('research.thinking')+'</div></div>';
  $('messages').appendChild(msgEl);$('messages').scrollTop=$('messages').scrollHeight;
  try{
    const r=await fetch('/api/research/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({topic:S.topic,paths:[...S.selected],history:S.history,message:txt})});
    const d=await r.json();
    S.history.push({role:'assistant',content:d.reply});
    renderMessages();
  }catch(e){msgEl.querySelector('.msg-text').textContent=t('research.error')+e.message;}
}

function renderMessages(){
  $('messages').innerHTML=S.history.map(m=>{
    const isAi=m.role==='assistant';
    return '<div class="msg"><div class="msg-ava '+(isAi?'ai':'user')+'">'+(isAi?t('research.avatarAI'):t('research.avatarUser'))+'</div><div class="msg-body"><div class="msg-role">'+(isAi?t('research.roleAI'):t('research.roleUser'))+'</div><div class="msg-text">'+(isAi?renderMd(m.content):esc(m.content))+'</div></div></div>';
  }).join('');
  $('messages').scrollTop=$('messages').scrollHeight;
}

function switchTab(btn,tab){
  S.tab=tab;
  document.querySelectorAll('.right-tabs button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderRight();
}

function renderRight(){
  const el=$('rightContent');
  if(S.tab==='overview'){
    if(!S.overview){el.innerHTML='<div class="empty">'+t('research.emptyOverview')+'</div>';return;}
    let h='<div class="overview-section"><h3>'+t('research.summary')+'</h3><div class="overview-item">'+renderMd(S.overview.summary)+'</div></div>';
    h+='<div class="overview-section"><h3>'+t('research.keyQuestions')+'</h3>'+(S.overview.keyQuestions||[]).map(q=>'<div class="overview-item" onclick="askQuestion(\''+esc(q.replace(/'/g,"\\'"))+'\')">' +esc(q)+'</div>').join('')+'</div>';
    h+='<div class="overview-section"><h3>'+t('research.keyConcepts')+'</h3>'+(S.overview.keyConcepts||[]).map(c=>'<div class="overview-item">'+esc(c)+'</div>').join('')+'</div>';
    el.innerHTML=h;
  }else if(S.tab==='tools'){
    const apiTools=[
      {icon:'📄',labelKey:'research.tool.report',tool:'report'},
      {icon:'📊',labelKey:'research.tool.compare',tool:'compare'},
      {icon:'🃏',labelKey:'research.tool.anki',tool:'anki'},
      {icon:'✏️',labelKey:'research.tool.outline',tool:'outline'},
    ];
    const promptTools=[
      {icon:'🗺️',labelKey:'research.tool.knowledgeMap',promptKey:'research.prompt.knowledgeMap'},
      {icon:'❓',labelKey:'research.tool.gaps',promptKey:'research.prompt.gaps'},
      {icon:'📝',labelKey:'research.tool.pptxOutline',promptKey:'research.prompt.pptxOutline'},
      {icon:'🧠',labelKey:'research.tool.mindmap',promptKey:'research.prompt.mindmap'},
      {icon:'📰',labelKey:'research.tool.infographic',promptKey:'research.prompt.infographic'},
      {icon:'🎙️',labelKey:'research.tool.podcast',promptKey:'research.prompt.podcast'},
      {icon:'📧',labelKey:'research.tool.execSummary',promptKey:'research.prompt.execSummary'},
    ];
    let h='<div class="overview-section"><h3>'+t('research.quickExport')+'</h3>';
    h+='<button class="tool-btn" onclick="exportPreview()"><span class="icon">👁</span>'+t('research.previewSlides')+'</button>';
    h+='<button class="tool-btn" onclick="exportPptx()"><span class="icon">📥</span>'+t('research.downloadPptx')+'</button></div>';
    h+='<div class="overview-section"><h3>'+t('research.aiTools')+'</h3>';
    h+=apiTools.map(a=>'<button class="tool-btn" onclick="runTool(\''+a.tool+'\')"><span class="icon">'+a.icon+'</span>'+t(a.labelKey)+'</button>').join('');
    h+=promptTools.map((p,i)=>'<button class="tool-btn" onclick="sendPromptTool('+i+')"><span class="icon">'+p.icon+'</span>'+t(p.labelKey)+'</button>').join('');
    h+='</div>';
    el.innerHTML=h;
    window._promptTools=promptTools.map(p=>({icon:p.icon,label:t(p.labelKey),prompt:t(p.promptKey)}));
  }else if(S.tab==='slides'){
    el.innerHTML='<button class="tool-btn" onclick="exportPreview()"><span class="icon">👁</span>'+t('research.previewSlides')+'</button>'
      +'<button class="tool-btn" onclick="exportPptx()"><span class="icon">📥</span>'+t('research.downloadPptx')+'</button>';
  }
}

function askQuestion(q){$('chatInput').value=q;sendMsg();}

function sendPromptTool(idx){
  if(!S.topic){alert(t('research.noTopic'));return;}
  const p=window._promptTools[idx];if(!p)return;
  $('chatInput').value=p.prompt;sendMsg();
}

async function runTool(tool){
  if(!S.topic){alert(t('research.noTopic'));return;}
  $('rightContent').innerHTML='<div class="loading">'+t('research.generating')+'</div>';
  try{
    const r=await fetch('/api/research/tools/'+tool,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({topic:S.topic,paths:[...S.selected]})});
    const d=await r.json();
    S.history.push({role:'assistant',content:d.result});renderMessages();
    $('rightContent').innerHTML='<div class="overview-item">'+renderMd(d.result)+'</div>';
  }catch(e){$('rightContent').innerHTML='<div class="empty">'+t('research.generateFail')+esc(e.message)+'</div>';}
}

async function exportPreview(){
  if(!S.topic)return;
  const content=S.history.filter(m=>m.role==='assistant').map(m=>m.content).join('\n\n');
  const form=document.createElement('form');form.method='POST';form.action='/api/research/export/preview';form.target='_blank';
  const inp=document.createElement('input');inp.type='hidden';inp.name='json';
  inp.value=JSON.stringify({content,topic:S.topic});form.appendChild(inp);
  document.body.appendChild(form);form.submit();form.remove();
}

async function exportPptx(){
  if(!S.topic)return;
  const content=S.history.filter(m=>m.role==='assistant').map(m=>m.content).join('\n\n');
  try{
    const r=await fetch('/api/research/export/pptx',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content,topic:S.topic})});
    const blob=await r.blob();const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='research.pptx';a.click();URL.revokeObjectURL(url);
  }catch(e){alert(t('research.exportFail')+e.message);}
}

// Apply saved theme + language on load
(function(){
  applyDarkMode();
  var f=_langFlags[_lang];
  if(f) $('rLangBtn').textContent=f;
  document.querySelectorAll('.lang-sw-opt').forEach(function(el){el.classList.toggle('active',el.getAttribute('data-lang')===_lang);});
  applyI18n();
})();

let searchTimer;
$('search').addEventListener('input',function(){clearTimeout(searchTimer);searchTimer=setTimeout(()=>loadNotes(this.value),300);});
loadNotes();
updateSelCount();
</script>
</body>
